# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: ubd-insurance.docs.buildwithfern.com
    edit-this-page:
      github:
        owner: fern-starter
        repo: mobilife
        branch: main
      launch: dashboard
title: Улаанбаатар Хотын Даатгал (UBD Insurance) | Documentation
layout:
  searchbar-placement: header
  page-width: full
navigation:
  - section: Ерөнхий мэдээлэл
    contents:
      - page: Broker Dynamic API танилцуулга
        path: docs/pages/collection-overview.mdx
  - api: Broker Dynamic API (MN)
    flattened: false
    layout:
      - auth:
          title: Нэвтрэх
          summary: docs/pages/1-overview.mdx
      - commonEndpoints:
          title: Нийтлэг endpoint-үүд
          summary: docs/pages/2-endpoint-overview.mdx
      - thd:
          title: Тээврийн хэрэгслийн даатгал
          summary: docs/pages/3-thd-overview.mdx
      - ht:
          title: Хүнд даацын машины даатгал
          summary: docs/pages/4-ht-overview.mdx
      - god:
          title: Гэнэтийн ослын даатгал
          summary: docs/pages/god-overview.mdx
      - thdLoan:
          title: Зээлтэй автомашины даатгал
          summary: docs/pages/5-thd-loan-overview.mdx
      - ajd:
          title: Албан журмын даатгал
          summary: docs/pages/6-ajd-overview.mdx
      - sgo:
          title: Суудлын гэнэтийн ослын даатгал
          summary: docs/pages/sgo-overview.mdx
colors:
  accent-primary:
    light: "#414099"
    dark: "#414099"
  background:
    light: "#F9F9FC"
    dark: "#030308"
  border:
    light: "#CDCCD3"
    dark: "#2A2A30"
theme:
  page-actions: toolbar
  footer-nav: minimal
logo:
  dark: docs/assets/logo-dark.png
  light: docs/assets/logo-light.png
  height: 20
  href: https://buildwithfern.com
favicon: docs/assets/favicon.svg
css: styles.css
